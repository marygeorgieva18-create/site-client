<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>СКБ22 | Дома под ключ</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            graphite: "#3A4149",
            steel: "#6B737C",
            mist: "#F5F5F5",
            brand: "#F37021"
          }
        }
      }
    }
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
</head>

<body class="bg-mist font-[Manrope]">

<!-- HEADER -->
<header class="bg-graphite text-white p-6 flex justify-between items-center">
  <div class="flex items-center gap-3">
    <img src="skb22-logo.png" class="h-10">
    <div>
      <div class="font-bold">СКБ22</div>
      <div class="text-sm opacity-70">Строительная компания</div>
    </div>
  </div>

  <a href="#projects" class="bg-brand px-5 py-2 rounded-full">Проекты</a>
</header>


<!-- HERO -->
<section class="text-center py-16 px-6">
  <h1 class="text-4xl font-extrabold max-w-3xl mx-auto">
    Дома из сибита, кирпича и каркасные дома под ключ
  </h1>
</section>


<!-- PROJECTS -->
<section id="projects" class="max-w-6xl mx-auto px-6 pb-16">

  <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">

    <!-- Терра 95 -->
    <div class="bg-white rounded-3xl overflow-hidden shadow">
      <img src="cover.webp" class="h-60 w-full object-cover">
      <div class="p-5">
        <div class="text-orange-500 text-sm mb-2">СИБИТ</div>
        <div class="font-bold text-xl">Терра 95</div>
        <div class="text-sm text-gray-500 mt-2">от 6,5 млн ₽</div>
      </div>
    </div>

    <!-- Терра Плюс -->
    <div class="bg-white rounded-3xl overflow-hidden shadow">
      <img src="cover.png" class="h-60 w-full object-cover">
      <div class="p-5">
        <div class="text-orange-500 text-sm mb-2">СИБИТ</div>
        <div class="font-bold text-xl">Терра Плюс 113</div>
        <div class="text-sm text-gray-500 mt-2">от 7,6 млн ₽</div>
      </div>
    </div>

    <!-- Вертикаль -->
    <div class="bg-white rounded-3xl overflow-hidden shadow">
      <img src="cover.jpg" class="h-60 w-full object-cover">
      <div class="p-5">
        <div class="text-orange-500 text-sm mb-2">СИБИТ</div>
        <div class="font-bold text-xl">Вертикаль</div>
        <div class="text-sm text-gray-500 mt-2">от 8,9 млн ₽</div>
      </div>
    </div>

    <!-- Атриум -->
    <div class="bg-white rounded-3xl overflow-hidden shadow">
      <img src="view-2.jpg" class="h-60 w-full object-cover">
      <div class="p-5">
        <div class="text-orange-500 text-sm mb-2">СИБИТ</div>
        <div class="font-bold text-xl">Атриум Скай</div>
      </div>
    </div>

    <!-- Фрейм -->
    <div class="bg-white rounded-3xl overflow-hidden shadow">
      <img src="view-2.webp" class="h-60 w-full object-cover">
      <div class="p-5">
        <div class="text-orange-500 text-sm mb-2">КАРКАС</div>
        <div class="font-bold text-xl">Фрейм</div>
      </div>
    </div>

  </div>

</section>


<!-- FOOTER -->
<footer class="bg-graphite text-white text-center p-6">
  СКБ22 • Барнаул
</footer>

</body>
</html>
